name: "Build, Test, Pack, and Deploy"
description: "Builds, tests, packs the npm package, and pushes it to Octopus"

inputs:
  prerelease-tag:
    description: "Optional prerelease tag (e.g., ci, pr.123.branch-name). If provided, generates a prerelease version. If empty, builds a release version."
    required: false
    default: ""
  octopus-url:
    description: "Octopus Deploy server URL"
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
      with:
        node-version: 24
        cache: "npm"

    - name: Install
      shell: bash
      run: npm ci

    - name: Test
      shell: bash
      run: npm test

    - name: Tests report
      uses: dorny/test-reporter@fe45e9537387dac839af0d33ba56eed8e24189e8 # v2.3.0
      if: success() || failure()
      with:
        name: Tests report
        path: "reports/jest-*.xml"
        reporter: jest-junit

    - name: Build
      shell: bash
      run: npm run build

    - name: Compute version
      id: version
      shell: bash
      run: |
        BASE=$(node -p "require('./package.json').version")
        if [ -n "${{ inputs.prerelease-tag }}" ]; then
          VERSION="${BASE}-${{ inputs.prerelease-tag }}.$(date -u +%Y%m%dT%H%M%S).${GITHUB_SHA:0:9}"
        else
          VERSION="$BASE"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Version: $VERSION"

    - name: Stamp prerelease version
      if: inputs.prerelease-tag != ''
      shell: bash
      # Only package.json is stamped; src/version.ts stays at the release base (mirrors .NET,
      # where --version-suffix moves the package version but leaves the assembly version).
      # dist/ is unaffected, so no rebuild is needed.
      # --ignore-scripts skips the repo's preversion/version lifecycle hooks (e.g. preversion runs
      # the linter); stamping is a pure version-number write and must not trigger other gates.
      run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version --ignore-scripts

    - name: Pack
      id: pack
      shell: bash
      run: |
        FILE=$(npm pack | tail -n 1)
        [ -f "$FILE" ] || { echo "Error: npm pack did not produce $FILE"; exit 1; }
        # npm pack joins the package id and version with a hyphen
        # (octopusdeploy-openfeature-3.0.2-pr....tgz). Octopus parses package filenames by splitting
        # on the first "-<digit>" run, so it reads the id as "octopusdeploy-openfeature-3" and the
        # version as "0.2-pr...". Rename so the id/version separator is a dot, which Octopus treats as
        # the canonical separator, yielding the correct id "octopusdeploy-openfeature".
        PKG_ID=$(node -p "require('./package.json').name.replace('@','').replace('/','-')")
        DEST="${PKG_ID}.${{ steps.version.outputs.version }}.tgz"
        mv "$FILE" "$DEST"
        echo "id=$PKG_ID" >> "$GITHUB_OUTPUT"
        echo "name=$DEST" >> "$GITHUB_OUTPUT"
        echo "Package: $DEST"

    # We don't push to Octopus from forks, so we upload the package as an artifact instead
    - name: Publish npm package
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: github.event.pull_request.head.repo.fork == true
      with:
        name: ${{ steps.pack.outputs.name }}
        path: ${{ steps.pack.outputs.name }}

    - name: Login to Octopus Deploy
      if: github.event.pull_request.head.repo.fork != true && (! contains(github.ref, '/dependabot/'))
      uses: OctopusDeploy/login@e39e03d07630f363bdccd6c7ad4eb28e0ea8a184 # v2
      with:
        server: ${{ inputs.octopus-url }}
        service_account_id: 42e00747-07e1-4214-979c-af3381e6d951

    - name: Push to Octopus
      uses: OctopusDeploy/push-package-action@c97226f7dc0e4fa3bd2fba9b5b30b2ac8a32048c # v4
      if: github.event.pull_request.head.repo.fork != true && (! contains(github.ref, '/dependabot/'))
      with:
        packages: |
          ${{ steps.pack.outputs.name }}

    - name: Create Release in Octopus
      uses: OctopusDeploy/create-release-action@4bd7d595da7f803e467d41c32fa0b5dbb9f222dc # v4
      if: github.event.pull_request.head.repo.fork != true && (! contains(github.ref, '/dependabot/'))
      with:
        project: "OpenFeature TypeScript Web Provider"
        release_number: ${{ steps.version.outputs.version }}
        packages: |
          ${{ steps.pack.outputs.id }}:${{ steps.version.outputs.version }}
